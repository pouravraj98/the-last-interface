<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect
    // Replaces the 404 page with a redirect to index.html preserving the path
    var base = '/the-last-interface';
    var path = window.location.pathname;
    if (path.startsWith(base)) {
      // Store the path and redirect to root
      sessionStorage.setItem('spa-redirect', path);
      window.location.replace(base + '/');
    }
  </script>
</head>
<body></body>
</html>
